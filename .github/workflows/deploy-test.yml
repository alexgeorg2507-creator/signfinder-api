name: Deploy Test

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS_TEST }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (test)
        run: |
          set -e
          # --async + poll instead of streaming logs: the CI SA can create/read
          # builds (cloudbuild.builds.editor) but Cloud Build's *default* logs
          # bucket only streams to accounts with the primitive Viewer/Owner
          # role — not worth granting just for log tailing.
          BUILD_ID=$(gcloud builds submit --config=cloudbuild-test.yaml --project=signfinder-cab-test --async --format="value(id)")
          echo "Build: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=signfinder-cab-test"
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --project=signfinder-cab-test --format="value(status)")
            case "$STATUS" in
              SUCCESS) echo "Build succeeded"; break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) echo "Build failed: $STATUS"; exit 1 ;;
              *) sleep 10 ;;
            esac
          done

      - name: Smoke test
        run: |
          set -e
          curl -sf https://signfinder-api-svmlmbccma-ew.a.run.app/health

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://signfinder-api-svmlmbccma-ew.a.run.app/v1/me/profile)
          if [ "$STATUS" != "401" ] && [ "$STATUS" != "403" ]; then
            echo "Expected 401/403 on unauthenticated /v1/me/profile, got $STATUS"
            exit 1
          fi
